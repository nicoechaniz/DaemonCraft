# --- Shaders (included, off by default) ---
# Complementary Reimagined ships with the pack but is NOT auto-enabled.
# Players toggle it in Video Settings -> Shader Packs.
# This avoids choking low-end laptops while giving high-end PCs the full experience.
[[shaders]]
slug = "complementary-reimagined"
version_id = "836bPNGo"           # r5.7.1 — included in overrides/shaderpacks/
