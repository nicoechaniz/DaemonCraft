version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: daemoncraft-minecraft
    restart: unless-stopped
    network_mode: host
    environment:
      # --- Core Server Settings ---
      EULA: "true"
      TYPE: "PURPUR"
      VERSION: "1.21.11"
      SERVER_NAME: "DaemonCraft-Dev"
      MOTD: "\\u00A72DaemonCraft\\u00A7r Development Server"

      # --- Memory ---
      MEMORY: "12G"
      INIT_MEMORY: "8G"
      MAX_MEMORY: "12G"

      # --- Gameplay / Dev Settings ---
      ONLINE_MODE: "false"
      DIFFICULTY: "peaceful"
      CREATE_CONSOLE_IN_PIPE: "true"
      ALLOW_FLIGHT: "true"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      MAX_PLAYERS: "20"
      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "10"
      GAME_MODE: "survival"

      # --- Modpack (CurseForge Auto-Install) ---
      # Requires a CurseForge API key. See docs/server-setup.md for details.
      # Uncomment the lines below and set CF_API_KEY in .env to enable:
      # MODPACK_PLATFORM: "CURSEFORGE"
      # CF_PAGE_URL: "https://www.curseforge.com/minecraft/modpacks/phi-craft/files/7654543"
      # CF_API_KEY: ${CF_API_KEY:-}

      # --- Manual Fallback ---
      # 1. Download the Phi-Craft modpack .zip manually.
      # 2. Place it in ./server/modpacks/phi-craft.zip
      # 3. Uncomment the lines below:
      # MODPACK: "/modpacks/phi-craft.zip"
      # MODPACK_PLATFORM: ""

      # --- Bedrock Edition support via Geyser ---
      # itzg auto-installs the Geyser-Spigot plugin from Modrinth on boot.
      # Geyser binds UDP/19132 (host network mode) and responds to RakNet
      # unconnected pings, so Bedrock clients on the LAN auto-discover the
      # server. No Floodgate: the Java side runs ONLINE_MODE=false, and
      # Geyser's auth-type=offline matches (see server/geyser/config.yml).
      # Note: Geyser only ships beta-tagged continuous builds on Modrinth.
      MODRINTH_PROJECTS: "geyser"
      MODRINTH_ALLOWED_VERSION_TYPE: "beta"

      # --- Logging ---
      TZ: "UTC"
    volumes:
      - ./server/data:/data
      # Mount Denizen scripts from repo (read-only)
      - ./server/plugins/denizen:/data/plugins/Denizen/scripts:ro
      # Mount for manual modpack fallback zip (read-only)
      - ./server/modpacks:/modpacks:ro
      # Geyser plugin config (versioned in repo). The plugin reads from
      # plugins/Geyser-Spigot/, so we mount our config tree there. itzg drops
      # the auto-downloaded jar one level up, in plugins/.
      - ./server/geyser:/data/plugins/Geyser-Spigot
    tty: true
    stdin_open: true
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # LAN Discovery Broadcaster — makes dedicated server visible in LAN list
  # ---------------------------------------------------------------------------
  lan-broadcast:
    image: python:3-alpine
    container_name: daemoncraft-lan-broadcast
    restart: unless-stopped
    network_mode: host
    environment:
      BROADCAST_MOTD: "DaemonCraft Dev Server"
      BROADCAST_PORT: "25565"
    volumes:
      - ./lan-broadcast/broadcast.py:/broadcast.py:ro
    command: python /broadcast.py

  # ---------------------------------------------------------------------------
  # Agent Bridge — Python Control Plane
  # ---------------------------------------------------------------------------
  bridge:
    build:
      context: ./agent-bridge
      dockerfile: Dockerfile
    container_name: daemoncraft-bridge
    restart: unless-stopped
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
      BOT_REGISTRY: ""
      TRIGGER_TIMEOUT: "30"
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    volumes:
      - ./agent-bridge:/app
    networks:
      - daemoncraft
    depends_on:
      - minecraft

  # ---------------------------------------------------------------------------
  # Redis — Message Bus for Future Swarm
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: daemoncraft-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - daemoncraft
    ports:
      - "6379:6379"

# ---------------------------------------------------------------------------
# Networks and Volumes
# ---------------------------------------------------------------------------
networks:
  daemoncraft:
    driver: bridge

volumes:
  redis-data:
