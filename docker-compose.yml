version: "3.8"

services:
  minecraft:
    # Pinned to a digest so restarts are deterministic. Bump deliberately
    # after a smoke test; do NOT switch back to :latest. See
    # docs/server-overhaul.md for the upgrade procedure (DC-125).
    image: itzg/minecraft-server@sha256:629762aaf864e109a35e00b11d701cfc6b2bddca4331944aefde0a352ebb9fd4
    container_name: daemoncraft-minecraft
    restart: unless-stopped
    network_mode: host
    environment:
      # --- Core Server Settings ---
      EULA: "true"
      TYPE: "PURPUR"
      VERSION: "1.21.11"
      SERVER_NAME: "Nico's DaemonCraft"
      MOTD: "Nico's DaemonCraft"

      # --- Memory ---
      MEMORY: "12G"
      INIT_MEMORY: "8G"
      MAX_MEMORY: "12G"

      # --- Gameplay / Dev Settings ---
      ONLINE_MODE: "false"
      # easy permits hostile mob spawns (rolemaster narrative tension) while
      # keeping kid-friendly damage scaling. Per-cast overrides via in-game
      # /difficulty are still allowed (Pamplinas can switch to peaceful for
      # specific scenes via mc_command).
      DIFFICULTY: "easy"
      CREATE_CONSOLE_IN_PIPE: "true"
      ALLOW_FLIGHT: "true"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      MAX_PLAYERS: "20"
      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "10"
      GAME_MODE: "survival"

      # --- Modpack (CurseForge Auto-Install) ---
      # Requires a CurseForge API key. See docs/server-setup.md for details.
      # Uncomment the lines below and set CF_API_KEY in .env to enable:
      # MODPACK_PLATFORM: "CURSEFORGE"
      # CF_PAGE_URL: "https://www.curseforge.com/minecraft/modpacks/phi-craft/files/7654543"
      # CF_API_KEY: ${CF_API_KEY:-}

      # --- Manual Fallback ---
      # 1. Download the Phi-Craft modpack .zip manually.
      # 2. Place it in ./server/modpacks/phi-craft.zip
      # 3. Uncomment the lines below:
      # MODPACK: "/modpacks/phi-craft.zip"
      # MODPACK_PLATFORM: ""

      # --- Plugins (auto-installed by itzg from Modrinth, DC-126) ---
      # Pinned version IDs so restarts are deterministic. Bumps land in
      # follow-up PRs after smoke-test. See docs/server-overhaul.md.
      # NOTE: when feat/bedrock-geyser-support merges upstream, this list
      # gains "geyser:R7DKgZlt" — combine the two lists at merge time.
      MODRINTH_PROJECTS: "luckperms:OrIs0S6b,coreprotect:HD2IvrxS,skinsrestorer:2PjHGlwd,decentholograms:t9gURTWO,tab-was-taken:FewsxQmS"
      MODRINTH_ALLOWED_VERSION_TYPE: "release"

      # RCON — enabled by default in Purpur; password is pinned here so the
      # mc-backup sidecar can reliably authenticate. Change in .env only.
      RCON_PASSWORD: ${RCON_PASSWORD:-daemoncraft-rcon}
      ENABLE_RCON: "true"

      # --- Logging ---
      TZ: "UTC"
    volumes:
      - ./server/data:/data
      # Mount Denizen scripts from repo (read-only)
      - ./server/plugins/denizen:/data/plugins/Denizen/scripts:ro
      # Mount for manual modpack fallback zip (read-only)
      - ./server/modpacks:/modpacks:ro
    tty: true
    stdin_open: true
    # Bound resource use so a runaway plugin or hot loop cannot OOM the host
    # (which would also take down redis, bridge, lan-broadcast). Tune to host
    # capacity; current target is a 16 GB / 8-core box with headroom.
    mem_limit: 14g
    cpus: 6.0
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # Backup Sidecar (DC-126) — periodic world snapshots with RCON save flush
  # ---------------------------------------------------------------------------
  # Destination is a placeholder bind-mount for now. Final destination will
  # move to Hetzner Storage Box or Backblaze B2 in a follow-up (decision in
  # plans/DC-126.md "Open Questions"). The sidecar pattern stays the same;
  # only the destination volume mapping changes.
  mc-backup:
    image: itzg/mc-backup@sha256:7ffba80d2c6752df8d1669451de928f9e7b2d94866cd84951af6e7bc5bed1496
    container_name: daemoncraft-mc-backup
    restart: unless-stopped
    network_mode: host
    environment:
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      INITIAL_DELAY: "5m"
      PRUNE_BACKUPS_DAYS: "30"
      RCON_HOST: localhost
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD:-minecraft}
      SRC_DIR: /data
      DEST_DIR: /backups
      BACKUP_NAME: daemoncraft
      TZ: UTC
    volumes:
      # Read the world from the live server. Read-only would be ideal but
      # mc-backup needs to call save-off / save-on via RCON, which is fine.
      - ./server/data:/data:ro
      # Local placeholder destination; override BACKUP_DEST in .env.
      - ${BACKUP_DEST:-./server/backups}:/backups
    depends_on:
      - minecraft

  # ---------------------------------------------------------------------------
  # LAN Discovery Broadcaster — makes dedicated server visible in LAN list
  # ---------------------------------------------------------------------------
  lan-broadcast:
    image: python:3-alpine
    container_name: daemoncraft-lan-broadcast
    restart: unless-stopped
    network_mode: host
    environment:
      BROADCAST_MOTD: "Nico's DaemonCraft"
      BROADCAST_PORT: "25565"
    volumes:
      - ./lan-broadcast/broadcast.py:/broadcast.py:ro
    command: python /broadcast.py

  # ---------------------------------------------------------------------------
  # Agent Bridge — Python Control Plane
  # ---------------------------------------------------------------------------
  bridge:
    build:
      context: ./agent-bridge
      dockerfile: Dockerfile
    container_name: daemoncraft-bridge
    restart: unless-stopped
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
      BOT_REGISTRY: ""
      TRIGGER_TIMEOUT: "30"
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    volumes:
      - ./agent-bridge:/app
    networks:
      - daemoncraft
    depends_on:
      - minecraft

  # ---------------------------------------------------------------------------
  # Redis — Message Bus for Future Swarm
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: daemoncraft-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - daemoncraft
    ports:
      - "6379:6379"

# ---------------------------------------------------------------------------
# Networks and Volumes
# ---------------------------------------------------------------------------
networks:
  daemoncraft:
    driver: bridge

volumes:
  redis-data:
