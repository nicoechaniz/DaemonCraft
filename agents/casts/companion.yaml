# DaemonCraft Companion Mode Cast
# Single agent that follows and helps the human player

name: companion
description: A single companion agent that plays alongside the human player
mode: companion
soul_file: SOUL-minecraft.md

agents:
  - name: Steve
    template: landfolk/steve
    port: 3001
    model: MiniMax-M2.7
    provider: minimax
    base_url: https://api.minimax.io/anthropic
    extra_toolsets:
      - vision
    max_chat_chars: 480
    # All bot-level configuration lives here — no more env var soup
    bot_config:
      minecraft:
        host: localhost
        port: 25565
        auth: offline
      server:
        api_port: 3001
      pathfinder:
        allow_sprinting: false
        can_dig: true
        allow_parkour: true
      chat:
        fragment_max_chars: 240
        max_fragments: 3
        fragment_delay_ms: 300

  - name: gAndy
    template: companion/gandy
    port: 3002
    model: MiniMax-M2.7
    provider: minimax
    base_url: https://api.minimax.io/anthropic
    extra_toolsets:
      - vision
    max_chat_chars: 420
    bot_config:
      minecraft:
        host: localhost
        port: 25565
        auth: offline
        username: gAndy
      server:
        api_port: 3002
      pathfinder:
        allow_sprinting: false
        can_dig: true
        allow_parkour: true
      chat:
        fragment_max_chars: 200
        max_fragments: 3
        fragment_delay_ms: 300

# Voice configuration for TTS output
# The gateway reads these values and passes them to the TTS tool when
# generating audio for dashboard playback.
# Supported providers: edge (free), openai, elevenlabs, minimax, mistral
voice:
  tts_provider: edge
  voice_id: es-MX-JorgeNeural        # Warm, mature Spanish male voice (Mexican accent)
  # Fallback / future options:
  # voice_style: warm
  # speed: 1.0
