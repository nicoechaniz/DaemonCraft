# DaemonCraft Rolemaster Mode Cast
# Solo Holodeck Director — Pamplinas manipulates the world directly.
# No supporting cast. He spawns what the story needs, when the timeline demands it.

name: rolemaster
description: |
  A single agent — Pamplinas, the Holodeck Director — who creates and guides
  adventures by manipulating the Minecraft world directly. He works alone:
  no helper bots, no NPC entourage. The world itself is his cast.
  
  Timelines are measured in Minecraft days (1 day = 20 real minutes).
  Stories breathe to the rhythm of sunrises and sunsets.

mode: rolemaster
soul_file: SOUL-rolemaster.md

# Pamplinas defines the cast he needs per-adventure in his blueprint JSON.
# This top-level cast is just the director.
agents:
  - name: Pamplinas
    template: rolemaster/pamplinas
    port: 3002
    model: MiniMax-M2.7
    provider: minimax
    base_url: https://api.minimax.io/anthropic
    extra_toolsets:
      - vision
    gamemode: creative
    immortal: true          # Daemon Guardian enforces creative + resistance/fire_resist/water_breathing every 5s
    max_chat_chars: 480

# Voice configuration for TTS output
# The gateway reads these values and passes them to the TTS tool when
# generating audio for dashboard playback.
# Supported providers: edge (free), openai, elevenlabs, minimax, mistral
voice:
  tts_provider: edge
  voice_id: es-MX-JorgeNeural        # Warm, mature Spanish male voice (Mexican accent)
  # Fallback / future options:
  # voice_style: warm
  # speed: 1.0

# Narrative timing configuration
# All story phases, triggers, and deadlines are expressed in Minecraft days.
timeline:
  unit: minecraft_days        # 1 day = 20 min real time = 24,000 ticks
  dawn: 0                     # Day counter resets / begins
  noon: 6000                  # Mid-day checkpoint
  dusk: 12000                 # Night falls — tension rises
  midnight: 18000             # Darkest hour — climax territory

# Example timeline schema (Pamplinas generates this per-adventure):
